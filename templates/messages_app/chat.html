{% extends 'base/base.html' %}

{% block content %}
<h2>Chat room: {{ room_name }}</h2>
<div class="mb-3">
    <textarea id="chat-log" class="form-control" rows="8" readonly></textarea>
</div>
<div class="input-group mb-3">
    <input id="chat-message-input" type="text" class="form-control" placeholder="Type a message...">
    <button id="chat-message-submit" class="btn btn-primary">Send</button>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
const roomName = "{{ room_name }}";
const wsScheme = window.location.protocol === "https:" ? "wss" : "ws";
const chatSocket = new WebSocket(
    `${wsScheme}://${window.location.host}/ws/messages/${roomName}/`
);

const chatLog = document.getElementById('chat-log');
const messageInput = document.getElementById('chat-message-input');
const messageSubmit = document.getElementById('chat-message-submit');

chatSocket.onmessage = function(event) {
    const data = JSON.parse(event.data);
    if (data.type === 'chat_message') {
        chatLog.value += `${data.username}: ${data.message}\n`;
        chatLog.scrollTop = chatLog.scrollHeight;
    }
};

chatSocket.onclose = function(event) {
    console.error('Chat socket closed unexpectedly');
};

messageSubmit.onclick = function() {
    const message = messageInput.value;
    if (message.trim() !== '') {
        chatSocket.send(JSON.stringify({
            'message': message
        }));
        messageInput.value = '';
    }
};

messageInput.addEventListener('keyup', function(event) {
    if (event.key === 'Enter') {
        messageSubmit.click();
    }
});
</script>
{% endblock %}
