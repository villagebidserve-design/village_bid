{% extends 'base/base.html' %}

{% block content %}

<h2>Products</h2>

<form method="GET">

    <input type="text"
           name="search"
           placeholder="Search products"
           class="form-control mb-2">

    <input type="number"
           name="min_price"
           placeholder="Min Price"
           class="form-control mb-2">

    <input type="number"
           name="max_price"
           placeholder="Max Price"
           class="form-control mb-2">

    <button type="submit"
            class="btn btn-success">
        Search
    </button>

</form>

<hr>

<div class="row">

{% for product in products %}

<div class="col-md-4">

    <div class="card mb-3">

        <div class="card-body">

            <h5>{{ product.title }}</h5>

            <p>₹{{ product.price }}</p>

        </div>

    </div>

</div>

{% endfor %}

</div>

{% endblock %}
